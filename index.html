<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>to do list</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>TO DO LIST </h1>
</header>

<main>
    <section>
        <form class="form" action="submit">
            <div class="all">
            <div class="start">
                <label class="task" for="text">Tasks :- </label>
                <input class="task-input" type="text" placeholder="task">
                <button class="add" type="button">Add</button>
            </div>
            <template class="text-template">
           
                <li class="list-item">
                    <input class="checkbox" type="checkbox" name="completed" placeholder="click" checked>
                    <label class="input-task" for="text"></label>
                    <button class="remove" type="button">Remove</button>
                </li>
            
            </template>
        <ol class="user-task"></ol>
    </div>
        </form>

    </section>
</main>
    
</body>
<script src="web.js"></script>
</html>
